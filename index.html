<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>計算力トレーニング</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css?v=data-1">
  </head>
  <body>
    <main class="app-shell">
      <section class="training-panel" aria-labelledby="app-title">
        <header class="app-header">
          <div>
            <p class="eyebrow">割り算 5レベル</p>
            <h1 id="app-title">計算力トレーニング</h1>
          </div>
          <div class="header-badge" aria-label="5段階のトレーニング">Lv</div>
        </header>

        <section id="setupPanel" class="setup-panel" aria-label="出題設定">
          <div class="player-panel">
            <label class="input-label" for="nicknameInput">ニックネーム</label>
            <input id="nicknameInput" class="nickname-input" type="text" maxlength="12" autocomplete="nickname" inputmode="text">
            <p id="dataStatus" class="data-status">端末内保存</p>
          </div>

          <div class="section-heading">
            <h2>レベル</h2>
          </div>

          <div class="mode-options" role="radiogroup" aria-label="レベル">
            <button class="mode-card is-active" type="button" role="radio" aria-checked="true" data-level="1">
              <span class="mode-title">レベル1</span>
              <span class="mode-meta">余りなし・36問</span>
              <span class="mode-target">◎ 30秒 / ○ 50秒</span>
              <span class="mode-copy">1〜2桁 ÷ 2〜9。商は1桁。</span>
            </button>
            <button class="mode-card" type="button" role="radio" aria-checked="false" data-level="2">
              <span class="mode-title">レベル2</span>
              <span class="mode-meta">余りあり・18問</span>
              <span class="mode-target">◎ 30秒 / ○ 55秒</span>
              <span class="mode-copy">1〜2桁 ÷ 2〜9。商と余りを入力。</span>
            </button>
            <button class="mode-card" type="button" role="radio" aria-checked="false" data-level="3">
              <span class="mode-title">レベル3</span>
              <span class="mode-meta">余りなし・36問</span>
              <span class="mode-target">◎ 50秒 / ○ 1分30秒</span>
              <span class="mode-copy">2〜4桁 ÷ 2〜9系の数。商も10倍系。</span>
            </button>
            <button class="mode-card" type="button" role="radio" aria-checked="false" data-level="4">
              <span class="mode-title">レベル4</span>
              <span class="mode-meta">余りなし・36問</span>
              <span class="mode-target">◎ 35秒 / ○ 1分</span>
              <span class="mode-copy">2桁 ÷ 2〜9。割り切れる問題。</span>
            </button>
            <button class="mode-card" type="button" role="radio" aria-checked="false" data-level="5">
              <span class="mode-title">レベル5</span>
              <span class="mode-meta">余りあり・18問</span>
              <span class="mode-target">◎ 35秒 / ○ 1分</span>
              <span class="mode-copy">2桁 ÷ 2〜9。商と余りを入力。</span>
            </button>
          </div>

          <button id="startButton" class="primary-action" type="button">スタート</button>

          <div class="data-panel">
            <div class="data-tabs" role="tablist" aria-label="データ表示">
              <button id="rankingTab" class="is-active" type="button" role="tab" aria-selected="true" data-data-view="ranking">ランキング</button>
              <button id="weaknessTab" type="button" role="tab" aria-selected="false" data-data-view="weakness">苦手</button>
            </div>

            <section id="rankingPanel" class="data-card" aria-label="ランキング">
              <div class="data-card-heading">
                <h2 id="rankingTitle">レベル1 ランキング</h2>
                <button id="refreshDataButton" class="mini-action" type="button">更新</button>
              </div>
              <ol id="rankingList" class="ranking-list">
                <li class="empty-row">まだ記録なし</li>
              </ol>
            </section>

            <section id="weaknessPanel" class="data-card" aria-label="苦手" hidden>
              <div class="data-card-heading">
                <h2>苦手</h2>
                <button id="weaknessModeButton" class="mini-action" type="button" disabled>苦手だけ</button>
              </div>
              <p id="weaknessSummary" class="data-note">まだ記録なし</p>
              <ul id="weaknessList" class="weakness-list"></ul>
            </section>
          </div>
        </section>

        <section id="gamePanel" class="game-panel" aria-label="トレーニング" hidden>
          <div id="countdownOverlay" class="countdown-overlay" aria-live="assertive" hidden>
            <span id="countdownText">3</span>
          </div>

          <div class="game-status">
            <div>
              <span class="status-label">問題</span>
              <strong id="progressText">1 / 36</strong>
            </div>
            <div>
              <span class="status-label">タイム</span>
              <strong id="timerText">00:00.0</strong>
            </div>
            <button id="homeButton" class="icon-action" type="button" aria-label="レベル選択へ戻る" title="レベル選択へ戻る">←</button>
            <button id="restartButton" class="icon-action" type="button" aria-label="やり直す" title="やり直す">↻</button>
          </div>

          <div class="progress-track" aria-hidden="true">
            <div id="progressFill" class="progress-fill"></div>
          </div>

          <div class="problem-card">
            <p id="modeLabel" class="mode-label">余りなし</p>
            <p id="targetText" class="target-text">◎ 30秒 / ○ 50秒</p>
            <div class="problem-line" aria-live="polite">
              <span id="dividendText">48</span>
              <span>÷</span>
              <span id="divisorText">6</span>
              <span>=</span>
            </div>

            <div class="answer-area" aria-label="答え入力">
              <button class="answer-field is-active" type="button" data-field="quotient" aria-label="商を入力">
                <span class="field-label">商</span>
                <span id="quotientValue" class="field-value">_</span>
              </button>
              <button id="remainderField" class="answer-field" type="button" data-field="remainder" aria-label="余りを入力" hidden>
                <span class="field-label">余り</span>
                <span id="remainderValue" class="field-value">_</span>
              </button>
            </div>

            <p id="feedbackText" class="feedback" aria-live="assertive"></p>
          </div>

          <div class="keypad" aria-label="数字入力キーボード">
            <button type="button" data-key="7">7</button>
            <button type="button" data-key="8">8</button>
            <button type="button" data-key="9">9</button>
            <button type="button" data-key="4">4</button>
            <button type="button" data-key="5">5</button>
            <button type="button" data-key="6">6</button>
            <button type="button" data-key="1">1</button>
            <button type="button" data-key="2">2</button>
            <button type="button" data-key="3">3</button>
            <button class="utility-key" type="button" data-action="backspace" aria-label="一文字消す">⌫</button>
            <button type="button" data-key="0">0</button>
            <button id="submitButton" class="submit-key" type="button" data-action="submit">答える</button>
            <button id="clearButton" class="utility-key clear-key" type="button" data-action="clear">クリア</button>
          </div>
        </section>

        <section id="resultPanel" class="result-panel" aria-label="結果" hidden>
          <p class="eyebrow">完了</p>
          <h2 id="resultTitle">レベル1 完了</h2>
          <div class="result-grade" aria-label="成果">
            <span id="gradeText">◎</span>
            <span id="gradeLabel">成果</span>
          </div>
          <dl class="result-stats">
            <div>
              <dt>タイム</dt>
              <dd id="finalTimeText">00:00.0</dd>
            </div>
            <div>
              <dt>まちがい</dt>
              <dd id="mistakeText">0回</dd>
            </div>
          </dl>
          <p id="resultSaveStatus" class="data-status">保存中</p>
          <div class="result-actions">
            <button id="retryButton" class="primary-action" type="button">同じレベルでもう一度</button>
            <button id="backToSetupButton" class="secondary-action" type="button">レベルを選び直す</button>
          </div>
        </section>
      </section>
    </main>

    <script src="firebase-config.js?v=data-1"></script>
    <script src="data-store.js?v=weakness-2"></script>
    <script src="app.js?v=weakness-2"></script>
  </body>
</html>
